$kind: http-request
name: Change Password
method: POST
url: "{{baseUrl}}/api/v1/auth/change-password"
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: "Bearer {{accessToken}}"
body:
  type: json
  content: |-
    {
      "currentPassword": "password123",
      "newPassword": "newpassword123",
      "confirmPassword": "newpassword123"
    }
