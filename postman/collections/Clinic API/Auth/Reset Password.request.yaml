$kind: http-request
name: Reset Password
method: POST
url: "{{baseUrl}}/api/v1/auth/reset-password"
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "{{resetToken}}",
      "newPassword": "newpassword123",
      "confirmPassword": "newpassword123"
    }
