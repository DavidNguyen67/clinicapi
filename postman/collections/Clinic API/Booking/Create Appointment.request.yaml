$kind: http-request
name: Create Appointment
url: "{{baseUrl}}/api/v1/booking/appointments"
method: POST
headers:
  Content-Type: application/json
  x-api-key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
        "patientId": "{{patientId}}",
        "doctorId": "{{doctorId}}",
        "serviceId": "{{serviceId}}",
        "appointmentDate": "2026-04-10T09:00:00",
        "startTime": "2026-04-10T09:00:00",
        "endTime": "2026-04-10T09:30:00",
        "bookingType": "online",
        "reason": "Regular checkup",
        "symptoms": "Headache, fever",
        "notes": "First visit"
    }
order: 1000
