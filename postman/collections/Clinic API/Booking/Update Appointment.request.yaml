$kind: http-request
url: "{{baseUrl}}/api/v1/booking/appointments"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{accessToken}}
  x-api-key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "appointmentId": "{{appointmentId}}",
      "status": "confirmed"
    }
order: 2000
